const todayStr = () => new Date().toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });

const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

const iStyle = { background:"#1a1a1a", border:"1px solid #2e2e2e", borderRadius:8, color:"#f0f0f0", padding:"7px 10px", fontSize:14, width:"100%", outline:"none", fontFamily:"inherit", textAlign:"center", boxSizing:"border-box" };

function getWeekKey(dateStr) {

  const d = new Date(dateStr + " 2026");

  if (isNaN(d)) { const d2 = new Date(dateStr); if (!isNaN(d2)) { const day=d2.getDay(); const mon=new Date(d2); mon.setDate(d2.getDate()-((day+6)%7)); return `${mon.getMonth()+1}/${mon.getDate()}`; } return dateStr; }

  const day=d.getDay(); const mon=new Date(d); mon.setDate(d.getDate()-((day+6)%7));

  return `${mon.getMonth()+1}/${mon.getDate()}`;

}

function getAllExerciseNames(history) {

  const names = new Set();

  history.forEach(w => (w.exercises||[]).forEach(ex => { if (ex.unit==="lbs" && ex.loggedSets?.some(s=>s.weight)) names.add(ex.name); }));

  return [...names].sort();

}

function BarChart({ data, color="#4caf50", label }) {

  const max = Math.max(...data.map(d=>d.value),1);

  return <div>

    {label && <div style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>{label}</div>}

    <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>

      {data.map((d,i) => <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>

        <div style={{fontSize:10,color,fontWeight:700}}>{d.value>0?d.value:""}</div>

        <div style={{width:"100%",background:d.value>0?color:"#1e1e1e",borderRadius:4,height:`${(d.value/max)*56}px`,minHeight:d.value>0?4:0,transition:"height 0.4s"}} />

        <div style={{fontSize:9,color:"#444",textAlign:"center"}}>{d.label}</div>

      </div>)}

    </div>

  </div>;

}

function LineChart({ data, color="#4caf50", label }) {

  const canvasRef = useRef();

  const max=Math.max(...data.map(d=>d.value),1), min=Math.min(...data.map(d=>d.value));

  useEffect(() => {

    const canvas=canvasRef.current; if(!canvas||data.length<2) return;

    const ctx=canvas.getContext("2d"), W=canvas.width, H=canvas.height, pad={t:10,b:10,l:8,r:8};

    ctx.clearRect(0,0,W,H);

    const range=max-min||1;

    const pts=data.map((d,i)=>({x:pad.l+(i/(data.length-1))*(W-pad.l-pad.r),y:pad.t+(1-(d.value-min)/range)*(H-pad.t-pad.b)}));

    const grad=ctx.createLinearGradient(0,0,0,H); grad.addColorStop(0,color+"44"); grad.addColorStop(1,color+"00");

    ctx.beginPath(); ctx.moveTo(pts[0].x,H); pts.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.lineTo(pts[pts.length-1].x,H); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

    ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin="round"; ctx.stroke();

    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});

  },[data,color]);

  return <div>

    {label && <div style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>{label}</div>}

    {data.length<2 ? <div style={{color:"#444",fontSize:13,textAlign:"center",padding:"20px 0"}}>Log more sessions to see a trend</div>

    : <><canvas ref={canvasRef} width={420} height={80} style={{width:"100%",height:80}} />

      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>{data.map((d,i)=><div key={i} style={{fontSize:9,color:"#444"}}>{d.label}</div>)}</div></>}

  </div>;

}

function CalendarHeatmap({ history }) {

  const today=new Date(), startMonday=new Date(today);

  startMonday.setDate(today.getDate()-((today.getDay()+6)%7)-63);

  const workoutDates=new Set(history.map(w=>{

    let d=new Date(w.date+" 2026"); if(isNaN(d)) d=new Date(w.date); return isNaN(d)?null:`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;

  }).filter(Boolean));

  const weeks=[]; const cur=new Date(startMonday);

  for(let w=0;w<10;w++){const days=[];for(let d=0;d<7;d++){const key=`${cur.getFullYear()}-${cur.getMonth()}-${cur.getDate()}`;days.push({key,active:workoutDates.has(key),isToday:cur.toDateString()===today.toDateString(),isFuture:cur>today});cur.setDate(cur.getDate()+1);}weeks.push(days);}

  return <div>

    <div style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Activity — last 10 weeks</div>

    <div style={{display:"flex",gap:4}}>

      <div style={{display:"flex",flexDirection:"column",gap:3,marginRight:2}}>{["M","T","W","T","F","S","S"].map((l,i)=><div key={i} style={{fontSize:9,color:"#444",height:14,lineHeight:"14px"}}>{l}</div>)}</div>

      {weeks.map((week,wi)=><div key={wi} style={{display:"flex",flexDirection:"column",gap:3,flex:1}}>{week.map((day,di)=><div key={di} style={{height:14,borderRadius:3,background:day.isFuture?"transparent":day.active?"#4caf50":"#1e1e1e",border:day.isToday?"1px solid #4caf50":"none",opacity:day.isFuture?0:1}} />)}</div>)}

    </div>

    <div style={{display:"flex",gap:6,marginTop:10,alignItems:"center"}}>

      <div style={{width:10,height:10,borderRadius:2,background:"#1e1e1e"}} /><span style={{fontSize:10,color:"#444"}}>No workout</span>

      <div style={{width:10,height:10,borderRadius:2,background:"#4caf50",marginLeft:8}} /><span style={{fontSize:10,color:"#444"}}>Workout</span>

    </div>

  </div>;

}

function ProgressView({ history, onBack }) {

  const allExNames=getAllExerciseNames(history);

  const [selectedEx,setSelectedEx]=useState(allExNames[0]||"");

  const weekCounts={};

  history.forEach(w=>{const wk=getWeekKey(w.date);weekCounts[wk]=(weekCounts[wk]||0)+1;});

  const last8Weeks=[]; const ref=new Date();

  for(let i=7;i>=0;i--){const d=new Date(ref);d.setDate(ref.getDate()-i*7-((ref.getDay()+6)%7));const lbl=`${d.getMonth()+1}/${d.getDate()}`;last8Weeks.push({label:lbl,value:weekCounts[lbl]||0});}

  const exHistory=[];

  history.forEach(w=>{const ex=(w.exercises||[]).find(e=>e.name===selectedEx);if(ex){const maxW=Math.max(...(ex.loggedSets||[]).map(s=>parseFloat(s.weight)||0));if(maxW>0)exHistory.push({label:w.date.split(",")[1]?.trim().split(" ").slice(0,2).join(" ")||w.date,value:maxW});}});

  return <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>

    <div style={{display:"flex",alignItems:"center",gap:12,padding:"24px 0 20px"}}>

      <button onClick={onBack} style={{background:"none",border:"1px solid #2e2e2e",borderRadius:10,color:"#888",padding:"6px 12px",cursor:"pointer",fontSize:13}}>← Back</button>

      <div style={{fontSize:20,fontWeight:800,color:"#f0f0f0"}}>📊 Progress</div>

    </div>

    {history.length===0 ? <div style={{textAlign:"center",color:"#444",marginTop:60,fontSize:15}}>No workouts yet.<br/>Start training!</div> : <>

      <div style={{background:"#111",border:"1px solid #222",borderRadius:14,padding:"18px",marginBottom:14}}><BarChart data={last8Weeks} color="#4caf50" label="Workouts per week" /></div>

      <div style={{background:"#111",border:"1px solid #222",borderRadius:14,padding:"18px",marginBottom:14}}>

        <div style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Strength over time</div>

        {allExNames.length===0 ? <div style={{color:"#444",fontSize:13}}>No weighted exercises logged yet</div> : <>

          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>

            {allExNames.map(n=><button key={n} onClick={()=>setSelectedEx(n)} style={{background:selectedEx===n?"#1a3a1a":"#1a1a1a",border:`1px solid ${selectedEx===n?"#4caf50":"#2e2e2e"}`,borderRadius:20,color:selectedEx===n?"#6fcf6f":"#666",padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>{n}</button>)}

          </div>

          <LineChart data={exHistory} color="#4caf50" label={`${selectedEx} — max weight (lbs)`} />

        </>}

      </div>

      <div style={{background:"#111",border:"1px solid #222",borderRadius:14,padding:"18px",marginBottom:14}}><CalendarHeatmap history={history} /></div>

    </>}

  </div>;

}

function SetRow({ set, idx, unit, onChange }) {

  const showWeight=unit!=="sec"&&unit!=="reps"&&unit!=="reps/side";

  return <div style={{display:"grid",gridTemplateColumns:showWeight?"28px 1fr 1fr":"28px 1fr",gap:8,alignItems:"center",marginBottom:6}}>

    <span style={{color:"#a0a0a0",fontSize:12,fontFamily:"monospace"}}>{idx+1}</span>

    <input type="number" placeholder={unit==="sec"?"secs":"reps"} value={set.reps??""} onChange={e=>onChange({...set,reps:e.target.value})} style={iStyle} />

    {showWeight && <input type="number" placeholder="lbs" value={set.weight??""} onChange={e=>onChange({...set,weight:e.target.value})} style={iStyle} />}

  </div>;

}

function ExerciseCard({ exercise, onRemove, onSetsChange }) {

  const showWeight=exercise.unit!=="sec"&&exercise.unit!=="reps"&&exercise.unit!=="reps/side";

  const [sets,setSets]=useState(Array.from({length:exercise.sets},()=>({reps:exercise.defaultReps??"",weight:exercise.defaultWeight??""})));

  const [done,setDone]=useState(false);

  const updateSets=(next)=>{setSets(next);onSetsChange&&onSetsChange(next);};

  return <div style={{background:done?"#0e1f0e":"#111",border:`1px solid ${done?"#2a5c2a":"#222"}`,borderRadius:14,padding:"16px 18px",marginBottom:14,transition:"all 0.3s"}}>

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

      <div style={{flex:1}}>

        <div style={{fontWeight:700,fontSize:15,color:done?"#6fcf6f":"#f0f0f0"}}>{exercise.name}</div>

        <div style={{fontSize:12,color:"#666",marginTop:2}}>{exercise.sets} sets · {exercise.defaultReps} {exercise.unit}{exercise.defaultWeight?` · ${exercise.defaultWeight} lbs`:""}</div>

      </div>

      <div style={{display:"flex",gap:8}}>

        {onRemove && <button onClick={onRemove} style={{background:"none",border:"1px solid #3a1a1a",borderRadius:20,color:"#8b3a3a",padding:"5px 10px",fontSize:12,cursor:"pointer"}}>✕</button>}

        <button onClick={()=>{const nd=!done;setDone(nd);onSetsChange&&onSetsChange(sets,nd);}} style={{background:done?"#2a5c2a":"#1e1e1e",border:`1px solid ${done?"#4caf50":"#333"}`,borderRadius:20,color:done?"#6fcf6f":"#555",padding:"5px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>{done?"✓ Done":"Mark Done"}</button>

      </div>

    </div>

    <div style={{display:"grid",gridTemplateColumns:showWeight?"28px 1fr 1fr":"28px 1fr",gap:8,marginBottom:6}}>

      <span/><div style={{fontSize:11,color:"#555",textAlign:"center",textTransform:"uppercase",letterSpacing:1}}>{exercise.unit==="sec"?"Secs":"Reps"}</div>

      {showWeight&&<div style={{fontSize:11,color:"#555",textAlign:"center",textTransform:"uppercase",letterSpacing:1}}>Lbs</div>}

    </div>

    {sets.map((set,i)=><SetRow key={i} set={set} idx={i} unit={exercise.unit} onChange={v=>{const next=[...sets];next[i]=v;updateSets(next);}} />)}

  </div>;

}

function AddExerciseForm({ onAdd, onCancel }) {

  const [name,setName]=useState(""); const [sets,setSets]=useState("3"); const [reps,setReps]=useState(""); const [weight,setWeight]=useState(""); const [unit,setUnit]=useState("lbs");

  const fl={fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:6};

  return <div style={{background:"#111",border:"1px solid #2e2e2e",borderRadius:14,padding:"20px 18px",marginBottom:14}}>

    <div style={{fontWeight:700,fontSize:15,color:"#f0f0f0",marginBottom:16}}>➕ New Exercise</div>

    <div style={{marginBottom:12}}><div style={fl}>Exercise Name</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Cable Fly" style={{...iStyle,textAlign:"left",padding:"10px 12px"}} /></div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>

      <div><div style={fl}>Sets</div><input type="number" value={sets} onChange={e=>setSets(e.target.value)} style={iStyle} /></div>

      <div><div style={fl}>Reps</div><input type="number" value={reps} onChange={e=>setReps(e.target.value)} style={iStyle} /></div>

      <div><div style={fl}>Weight</div><input type="number" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="opt." style={iStyle} /></div>

    </div>

    <div style={{marginBottom:16}}><div style={fl}>Unit</div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>

        {["lbs","sec","reps","reps/side"].map(u=><button key={u} onClick={()=>setUnit(u)} style={{background:unit===u?"#1a3a1a":"#1a1a1a",border:`1px solid ${unit===u?"#4caf50":"#2e2e2e"}`,borderRadius:8,color:unit===u?"#6fcf6f":"#666",padding:"7px 4px",fontSize:11,cursor:"pointer",fontWeight:600}}>{u}</button>)}

      </div>

    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

      <button onClick={onCancel} style={{background:"none",border:"1px solid #2e2e2e",borderRadius:10,color:"#666",padding:"10px",fontSize:14,cursor:"pointer"}}>Cancel</button>

      <button onClick={()=>{if(!name.trim()||!reps)return;onAdd({name:name.trim(),sets:parseInt(sets)||3,defaultReps:parseInt(reps),defaultWeight:weight?parseFloat(weight):null,unit,custom:true});}} disabled={!name.trim()||!reps} style={{background:name.trim()&&reps?"#4caf50":"#1a1a1a",border:"none",borderRadius:10,color:name.trim()&&reps?"#fff":"#444",padding:"10px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Add</button>

    </div>

  </div>;

}

function WorkoutView({ type, onBack, onFinish }) {

  const workout=WORKOUTS[type];

  const [exercises,setExercises]=useState(workout.exercises.map(ex=>({...ex,loggedSets:Array.from({length:ex.sets},()=>({reps:ex.defaultReps??"",weight:ex.defaultWeight??""})),done:false})));

  const [showAddForm,setShowAddForm]=useState(false);

  const [notes,setNotes]=useState("");

  const [startTime]=useState(Date.now());

  const [elapsed,setElapsed]=useState(0);

  useEffect(()=>{const id=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime)/1000)),1000);return()=>clearInterval(id);},[]);

  const doneCount=exercises.filter(e=>e.done).length;

  return <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>

    <div style={{display:"flex",alignItems:"center",gap:12,padding:"24px 0 20px"}}>

      <button onClick={onBack} style={{background:"none",border:"1px solid #2e2e2e",borderRadius:10,color:"#888",padding:"6px 12px",cursor:"pointer",fontSize:13}}>← Back</button>

      <div style={{flex:1}}>

        <div style={{fontSize:20,fontWeight:800,color:"#f0f0f0"}}>{workout.emoji} {workout.label}</div>

        <div style={{fontSize:12,color:"#555",marginTop:2}}>{doneCount}/{exercises.length} done · {todayStr()}</div>

      </div>

      <div style={{fontFamily:"monospace",fontSize:18,color:"#4caf50",background:"#0e1f0e",border:"1px solid #2a5c2a",borderRadius:10,padding:"6px 12px"}}>{fmt(elapsed)}</div>

    </div>

    {exercises.map((ex,i)=><ExerciseCard key={i} exercise={ex} onRemove={()=>setExercises(prev=>prev.filter((_,j)=>j!==i))} onSetsChange={(sets,done)=>setExercises(prev=>prev.map((e,j)=>j===i?{...e,loggedSets:sets,done:done!==undefined?done:e.done}:e))} />)}

    {showAddForm ? <AddExerciseForm onAdd={ex=>{setExercises(prev=>[...prev,{...ex,loggedSets:Array.from({length:ex.sets},()=>({reps:ex.defaultReps??"",weight:ex.defaultWeight??""})),done:false}]);setShowAddForm(false);}} onCancel={()=>setShowAddForm(false)} />

    : <button onClick={()=>setShowAddForm(true)} style={{width:"100%",background:"#111",border:"1px dashed #333",borderRadius:14,padding:"14px",color:"#666",fontSize:14,cursor:"pointer",marginBottom:14,fontWeight:600}}>+ Add Exercise</button>}

    <div style={{background:"#111",border:"1px solid #222",borderRadius:14,padding:"16px 18px",marginBottom:14}}>

      <div style={{fontSize:13,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>📝 Session Notes</div>

      <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="How did it feel? Any PRs? Things to remember..." style={{...iStyle,textAlign:"left",padding:"10px 12px",resize:"none",height:90,lineHeight:1.5,fontSize:14}} />

    </div>

    <button onClick={()=>onFinish(elapsed,exercises.filter(e=>e.done),notes.trim())} style={{width:"100%",background:"#4caf50",color:"#fff",border:"none",borderRadius:14,padding:"16px",fontSize:16,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 20px rgba(76,175,80,0.3)"}}>Finish Workout 🏁</button>

    <button onClick={()=>window.open("https://connect.garmin.com/modern/activity/create/manual","_blank")} style={{width:"100%",background:"none",border:"1px solid #1a3a5c",borderRadius:14,padding:"14px",color:"#5b9bd5",fontSize:14,cursor:"pointer",marginTop:10,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>🏃 Log on Garmin Connect</button>

  </div>;

}

function HistoryDetailView({ entry, onBack }) {

  const workout=WORKOUTS[entry.type];

  return <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>

    <div style={{display:"flex",alignItems:"center",gap:12,padding:"24px 0 20px"}}>

      <button onClick={onBack} style={{background:"none",border:"1px solid #2e2e2e",borderRadius:10,color:"#888",padding:"6px 12px",cursor:"pointer",fontSize:13}}>← Back</button>

      <div style={{flex:1}}>

        <div style={{fontSize:20,fontWeight:800,color:"#f0f0f0"}}>{workout.emoji} {workout.label}</div>

        <div style={{fontSize:12,color:"#555",marginTop:2}}>{entry.date} · {entry.duration}</div>

      </div>

    </div>

    {entry.exercises&&entry.exercises.length>0 ? entry.exercises.map((ex,i)=>{

      const showWeight=ex.unit!=="sec"&&ex.unit!=="reps"&&ex.unit!=="reps/side";

      return <div key={i} style={{background:"#0e1f0e",border:"1px solid #2a5c2a",borderRadius:14,padding:"16px 18px",marginBottom:14}}>

        <div style={{fontWeight:700,fontSize:15,color:"#6fcf6f",marginBottom:10}}>✓ {ex.name}</div>

        <div style={{display:"grid",gridTemplateColumns:showWeight?"28px 1fr 1fr":"28px 1fr",gap:8,marginBottom:6}}>

          <span/><div style={{fontSize:11,color:"#555",textAlign:"center",textTransform:"uppercase",letterSpacing:1}}>{ex.unit==="sec"?"Secs":"Reps"}</div>

          {showWeight&&<div style={{fontSize:11,color:"#555",textAlign:"center",textTransform:"uppercase",letterSpacing:1}}>Lbs</div>}

        </div>

        {(ex.loggedSets||[]).map((set,j)=><div key={j} style={{display:"grid",gridTemplateColumns:showWeight?"28px 1fr 1fr":"28px 1fr",gap:8,marginBottom:6,alignItems:"center"}}>

          <span style={{color:"#555",fontSize:12,fontFamily:"monospace"}}>{j+1}</span>

          <div style={{background:"#1a1a1a",border:"1px solid #2e2e2e",borderRadius:8,padding:"7px 10px",textAlign:"center",fontSize:14,color:set.reps?"#f0f0f0":"#444"}}>{set.reps||"—"}</div>

          {showWeight&&<div style={{background:"#1a1a1a",border:"1px solid #2e2e2e",borderRadius:8,padding:"7px 10px",textAlign:"center",fontSize:14,color:set.weight?"#f0f0f0":"#444"}}>{set.weight||"—"}</div>}

        </div>)}

      </div>;

    }) : <div style={{textAlign:"center",color:"#444",marginTop:40,fontSize:14}}>No exercises marked as done.</div>}

    {entry.notes ? <div style={{background:"#111",border:"1px solid #222",borderRadius:14,padding:"16px 18px",marginTop:4}}>

      <div style={{fontSize:12,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📝 Notes</div>

      <div style={{fontSize:14,color:"#ccc",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{entry.notes}</div>

    </div> : null}

  </div>;

}

function HistoryView({ history, onBack, onSelect }) {

  return <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>

    <div style={{display:"flex",alignItems:"center",gap:12,padding:"24px 0 20px"}}>

      <button onClick={onBack} style={{background:"none",border:"1px solid #2e2e2e",borderRadius:10,color:"#888",padding:"6px 12px",cursor:"pointer",fontSize:13}}>← Back</button>

      <div style={{fontSize:20,fontWeight:800,color:"#f0f0f0"}}>History</div>

    </div>

    {history.length===0 ? <div style={{textAlign:"center",color:"#444",marginTop:60,fontSize:15}}>No workouts yet.<br/>Go crush one! 💪</div>

    : [...history].reverse().map((w,i)=><button key={i} onClick={()=>onSelect(history.length-1-i)} style={{width:"100%",background:"#111",border:"1px solid #222",borderRadius:14,padding:"16px 18px",marginBottom:12,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

      <div>

        <div style={{fontWeight:700,color:"#f0f0f0",fontSize:15}}>{WORKOUTS[w.type].emoji} {WORKOUTS[w.type].label}</div>

        <div style={{fontSize:12,color:"#555",marginTop:3}}>{w.date} · {w.exercises?w.exercises.length:0} exercises{w.notes?" · 📝":""}</div>

      </div>

      <div style={{display:"flex",alignItems:"center",gap:10}}>

        <div style={{color:"#4caf50",fontFamily:"monospace",fontSize:14}}>{w.duration}</div>

        <div style={{color:"#444",fontSize:16}}>›</div>

      </div>

    </button>)}

  </div>;

}

function App() {

  const [screen,setScreen]=useState("home");

  const [showReset,setShowReset]=useState(false);

  const [selectedEntry,setSelectedEntry]=useState(null);

  const [history,setHistory]=useState([]);

  const [ready,setReady]=useState(false);

  // Handle iOS back gesture in standalone mode

  const navigateTo = (newScreen, entry=null) => {

    window.history.pushState({screen: newScreen, entry}, "");

    setScreen(newScreen);

    if (entry !== null) setSelectedEntry(entry);

  };

  const navigateBack = () => {

    window.history.back();

  };

  useEffect(() => {

    const handlePop = (e) => {

      if (e.state) {

        setScreen(e.state.screen || "home");

        setSelectedEntry(e.state.entry !== undefined ? e.state.entry : null);

      } else {

        setScreen("home");

        setSelectedEntry(null);

      }

    };

    window.addEventListener("popstate", handlePop);

    return () => window.removeEventListener("popstate", handlePop);

  }, []);

  useEffect(()=>{

    try {

      const seeded=localStorage.getItem("wt_seeded_v1");

      if(!seeded){

        let existing=[];

        try{const r=localStorage.getItem("wt_history");if(r){const p=JSON.parse(r);if(Array.isArray(p))existing=p;}}catch(e){}

        const existingDates=new Set(existing.map(w=>w.date));

        const toAdd=SEED_DATA.filter(w=>!existingDates.has(w.date));

        const merged=[...toAdd,...existing];

        setHistory(merged);

        localStorage.setItem("wt_history",JSON.stringify(merged));

        localStorage.setItem("wt_seeded_v1","true");

      } else {

        try{const r=localStorage.getItem("wt_history");if(r){const p=JSON.parse(r);if(Array.isArray(p))setHistory(p);}}catch(e){}

      }

    } catch(e){}

    setReady(true);

  },[]);

  const saveHistory=(next)=>{

    setHistory(next);

    try{localStorage.setItem("wt_history",JSON.stringify(next));}catch(e){}

  };

  const handleFinish=async(elapsed,exercises,notes)=>{

    const entry={type:screen,date:todayStr(),duration:fmt(elapsed),exercises,notes};

    saveHistory([...history,entry]);

    setScreen("home");

  };

  const lastWorkout=history.length>0?history[history.length-1]:null;

  const bigBtn=(accent,bg,border)=>({width:"100%",background:bg,border:`1px solid ${border}`,borderRadius:16,padding:"18px 20px",color:"#f0f0f0",cursor:"pointer",display:"flex",alignItems:"center",gap:16,textAlign:"left",boxShadow:`0 4px 20px ${accent}20`});

  const statCard={background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:"16px 18px"};

  if(!ready) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#0a0a0a",color:"#444",fontSize:14}}>Loading...</div>;

  if(screen==="upper"||screen==="lower") return <WorkoutView type={screen} onBack={navigateBack} onFinish={handleFinish} />;

  if(screen==="history"&&selectedEntry!==null) return <HistoryDetailView entry={history[selectedEntry]} onBack={navigateBack} />;

  if(screen==="history") return <HistoryView history={history} onBack={navigateBack} onSelect={idx=>{window.history.pushState({screen:"history",entry:idx},"");setSelectedEntry(idx);}} />;

  if(screen==="progress") return <ProgressView history={history} onBack={navigateBack} />;

  return <div style={{minHeight:"100vh",background:"#0a0a0a",color:"#f0f0f0",fontFamily:"-apple-system,'Helvetica Neue',sans-serif"}}>

    <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px"}}>

      <div style={{paddingTop:56,paddingBottom:32}}>

        <div style={{fontSize:28,fontWeight:900,color:"#f0f0f0",letterSpacing:-0.5}}>Workout Tracker</div>

        <div style={{fontSize:14,color:"#555",marginTop:6}}>{todayStr()}</div>

      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:32}}>

        <div style={statCard}><div style={{fontSize:28,fontWeight:900,color:"#4caf50"}}>{history.length}</div><div style={{fontSize:12,color:"#555",marginTop:4,textTransform:"uppercase",letterSpacing:1}}>Total Workouts</div></div>

        <div style={statCard}>

          <div style={{fontSize:15,fontWeight:700,color:"#f0f0f0",lineHeight:1.3}}>{lastWorkout?`${WORKOUTS[lastWorkout.type].emoji} ${WORKOUTS[lastWorkout.type].label}`:"—"}</div>

          {lastWorkout&&<div style={{fontSize:12,color:"#4caf50",marginTop:4}}>{lastWorkout.date}</div>}

          <div style={{fontSize:12,color:"#555",marginTop:2,textTransform:"uppercase",letterSpacing:1}}>Last Session</div>

        </div>

      </div>

      <div style={{fontSize:11,color:"#444",textTransform:"uppercase",letterSpacing:2,marginBottom:14}}>Start Workout</div>

      <button onClick={()=>navigateTo("upper")} style={bigBtn("#4caf50","#0e1f0e","#2a5c2a")}>

        <span style={{fontSize:28}}>💪</span>

        <div style={{textAlign:"left"}}><div style={{fontWeight:800,fontSize:17}}>Upper A</div><div style={{fontSize:12,opacity:0.7,marginTop:2}}>Chest · Pullover · Shoulder · Lateral · Row · Curl</div></div>

      </button>

      <button onClick={()=>navigateTo("lower")} style={{...bigBtn("#fb8c00","#1f1200","#5c3a00"),marginTop:12}}>

        <span style={{fontSize:28}}>🦵</span>

        <div style={{textAlign:"left"}}><div style={{fontWeight:800,fontSize:17}}>Lower A</div><div style={{fontSize:12,opacity:0.7,marginTop:2}}>Squat · RDL · Glute · Lunge · Dead Bug · Calf</div></div>

      </button>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:20}}>

        <button onClick={()=>navigateTo("progress")} style={{background:"none",border:"1px solid #2e2e2e",borderRadius:14,padding:"14px",color:"#666",fontSize:14,cursor:"pointer",fontWeight:600}}>📊 Progress</button>

        <button onClick={()=>navigateTo("history")} style={{background:"none",border:"1px solid #2e2e2e",borderRadius:14,padding:"14px",color:"#666",fontSize:14,cursor:"pointer",fontWeight:600}}>📋 History</button>

      </div>

      {showReset ? <div style={{marginTop:16,background:"#1a0a0a",border:"1px solid #5c2a2a",borderRadius:14,padding:"16px 18px"}}>

        <div style={{fontSize:14,color:"#f0f0f0",marginBottom:12}}>Reset all workout history?</div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

          <button onClick={()=>setShowReset(false)} style={{background:"none",border:"1px solid #2e2e2e",borderRadius:10,color:"#666",padding:"10px",fontSize:14,cursor:"pointer"}}>Cancel</button>

          <button onClick={()=>{saveHistory([]);localStorage.removeItem("wt_seeded_v1");setShowReset(false);}} style={{background:"#5c2a2a",border:"none",borderRadius:10,color:"#ff6b6b",padding:"10px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Reset</button>

        </div>

      </div> : <button onClick={()=>setShowReset(true)} style={{width:"100%",background:"none",border:"1px solid #2a1a1a",borderRadius:14,padding:"12px",color:"#4a2a2a",fontSize:13,cursor:"pointer",marginTop:16,fontWeight:600}}>Reset all data</button>}

    </div>

  </div>;

}

ReactDOM.render(<App />, document.getElementById('root'));

</script>

</body>

</html>
